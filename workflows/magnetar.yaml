workflow:
  schema_version: '1.0'
  name: magnetar
  entry_skill: .codex/skills/magnetar/SKILL.md
  mode: guided
  task_type: hybrid
  visibility: collapsed_by_default
  requirement:
    goal: Convert a remote or local model into an AXera AXMODEL package with customer-facing Python and C++ SDKs.
    output:
      format: directory
      destination: TASK_DIR/package/
      consumer: both
    constraints:
      time_budget: per-model, no global fixed limit
      cost_budget: no paid external actions without user approval
      technology:
      - Pulsar2 for ONNX to AXMODEL compilation
      - Pulsar2 Docker image fallback from https://hf-mirror.co/AXERA-TECH/Pulsar2/tree/main
      - HuggingFace downloads must use hf-mirror with HF_ENDPOINT=https://hf-mirror.co
      - Python virtual environments must be managed with uv
      - ONNX static shape
      - onnxruntime for ONNX validation
      - Python SDK with pyaxengine and AxEngineExecutionProvider by default
      - C++ SDK with CMake and direct AX Engine runtime linking
      - Arm GNU aarch64 toolchain from https://developer.arm.com/-/media/Files/downloads/gnu-a/9.2-2019.12/binrel/gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu.tar.xz
      security:
      - do not modify source model repositories
      - do not guess private credentials
      - do not include secrets in package artifacts
      human_approval_required: true
    acceptance:
      checks:
      - export/model.onnx exists, has static shapes, and loads in onnxruntime
      - export/model_meta.json contains input and output names, shapes, dtypes, and preprocessing notes
      - compile/model.axmodel exists and is non-empty
      - simulate/simulate_report.md records ONNX vs AXMODEL metrics with multi-input mean ± std
      - default cosine similarity is at least 0.99 unless task-specific metrics justify acceptance
      - Python SDK imports successfully and includes a pyaxengine runnable example
      - C++ SDK configures with CMake and cross-compiles against AX Engine runtime when the aarch64 toolchain is available
      - when BOARD is provided, Python and C++ SDK examples run on a board whose chip_type matches TARGET_HARDWARE
      - package/README.md explains model overview, quick start (inference + reproduce), directory layout, performance, and
        limitations
      - package/model_convert/README.md covers env setup, ONNX export, calibration, pulsar2 compile (full command, no placeholders),
        artifact check, and FAQ
      - package/model_convert/requirements.txt exists with all dependencies grouped by category
      - package/model_convert/compile_pulsar2.sh exists and is directly executable
      - package/python/README.md covers env setup, install, quick run, API, and preprocessing
      - package/cpp/README.md covers env, local/cross build, board deployment, and API
      - package/reports/performance_report.md exists with pipeline timing, model efficiency, latency, and board memory sections
      - all README commands are complete with no placeholders like "..." or "<path>"
      metrics:
      - cosine_similarity
      - mae
      - max_abs_diff
      - task_specific_accuracy_when_available
      - multi_sample_mean_and_std_for_all_accuracy_metrics
      - onnx_size_bytes
      - axmodel_size_bytes
      - compression_ratio
      - macs
      - macs_utilization_pct
      - inference_latency_ms
      required_artifacts:
      - package/models/model.axmodel
      - package/models/model_meta.json
      - package/python/
      - package/python/README.md
      - package/cpp/
      - package/cpp/README.md
      - package/model_convert/
      - package/model_convert/README.md
      - package/model_convert/requirements.txt
      - package/model_convert/export_onnx.py
      - package/model_convert/compile_pulsar2.sh
      - package/model_convert/pulsar2_config.json
      - package/model_convert/model.onnx
      - package/reports/
      - package/reports/performance_report.md
      - package/README.md
      - package/.gitignore
    assumptions:
    - The Arm URL supplied by the user is the C++ cross-compilation toolchain source, not a Pulsar2 distribution.
    - Pulsar2 is provided by the user environment, a local binary, a user-specified Docker image/package, or the HuggingFace
      AXERA-TECH/Pulsar2 Docker image fallback through hf-mirror.
    - uv is required for every task virtual environment; missing uv blocks the workflow instead of falling back to venv, virtualenv,
      or conda.
    - RUNONBOARD is optional unless BOARD is provided.
    - ax_run_model is only a model smoke check and never substitutes for Python/C++ SDK execution.
    open_questions: []
  capabilities:
  - id: grill_me_alignment
    purpose: Requirement alignment before workflow design
    source: existing
    skill_path: /home/yrz/.codex/skills/grill-me/SKILL.md
    permissions: []
    required: true
  - id: acquire
    purpose: Acquire remote or local model into TASK_DIR/origin
    source: generate
    skill_path: .codex/skills/magnetar/hidden/acquire/SKILL.md
    permissions:
    - network
    - filesystem
    required: true
  - id: export
    purpose: Export static ONNX, validate source-vs-ONNX, and generate metadata/calibration data
    source: generate
    skill_path: .codex/skills/magnetar/hidden/export/SKILL.md
    permissions:
    - filesystem
    - network
    required: true
  - id: pulsar2
    purpose: Compile ONNX to AXMODEL
    source: install
    skill_path: .codex/skills/magnetar/hidden/toolchain/SKILL.md
    permissions:
    - filesystem
    - docker
    - network
    required: true
  - id: cxx_toolchain
    purpose: Build and validate C++ SDK for aarch64
    source: install
    skill_path: .codex/skills/magnetar/hidden/toolchain/SKILL.md
    permissions:
    - network
    - filesystem
    required: false
  - id: sdk_gen
    purpose: Generate Python and C++ customer SDKs
    source: generate
    skill_path: .codex/skills/magnetar/hidden/sdk-gen/SKILL.md
    permissions:
    - filesystem
    required: true
  - id: board_runtime
    purpose: Optional board-side Python/C++ SDK validation on hardware matching TARGET_HARDWARE
    source: external
    skill_path: .codex/skills/magnetar/hidden/runonboard/SKILL.md
    permissions:
    - network
    - ssh
    required: true
    description: Mandatory board-side Python/C++ SDK validation on hardware matching TARGET_HARDWARE
  inputs:
  - id: SOURCE
    type: text
    required: true
    source: user
    validation:
    - git URL, HuggingFace repo, HTTP URL, local file, or local directory
  - id: TARGET_HARDWARE
    type: text
    required: true
    source: user
    validation:
    - AX650, AX620E, or another Pulsar2-supported AX target confirmed by user
  - id: MODEL_NAME
    type: text
    required: false
    source: user
    validation:
    - inferred from SOURCE when absent
  - id: TASK_DIR
    type: directory
    required: false
    source: user
    validation:
    - defaults to todos/work/<timestamp>-<model-name>/
  - id: HF_TOKEN
    type: credential
    required: false
    source: environment
    validation:
    - required only for private HuggingFace models
  - id: HF_ENDPOINT
    type: url
    required: true
    source: environment
    validation:
    - must be https://hf-mirror.co for HuggingFace downloads
  - id: uv
    type: executable
    required: true
    source: environment
    validation:
    - required for all Python virtual environments
  - id: PULSAR2_IMAGE
    type: text
    required: false
    source: user
    validation:
    - Docker image name or local package reference
  - id: PULSAR2_BIN
    type: file
    required: false
    source: user
    validation:
    - executable Pulsar2 binary path
  - id: PULSAR2_HF_REPO
    type: url
    required: false
    source: external
    validation:
    - defaults to https://hf-mirror.co/AXERA-TECH/Pulsar2/tree/main when local Pulsar2 is unavailable
  - id: BOARD
    type: text
    required: true
    source: user
    validation:
    - user@host[:port]
    description: Board SSH info, format user@host[:port]. Required upfront — checked at requirements gate before any stage
      runs.
  - id: BOARD_PASSWORD
    type: credential
    required: true
    source: user
    validation:
    - default AX board password 123456 may be used only because the user provided it
  outputs:
  - id: axmodel
    type: file
    destination: TASK_DIR/package/models/model.axmodel
    required: true
    validation:
    - exists
    - non_empty
  - id: python_sdk
    type: directory
    destination: TASK_DIR/package/python/
    required: true
    validation:
    - import_check
  - id: cpp_sdk
    type: directory
    destination: TASK_DIR/package/cpp/
    required: true
    validation:
    - cmake_configure
  - id: model_convert
    type: directory
    destination: TASK_DIR/package/model_convert/
    required: true
    validation:
    - contains_export_script
    - contains_pulsar2_config
  - id: reports
    type: directory
    destination: TASK_DIR/package/reports/
    required: true
    validation:
    - export_report
    - compile_report
    - simulate_report
  - id: customer_readme
    type: file
    destination: TASK_DIR/package/README.md
    required: true
    validation:
    - contains_usage
  - id: performance_report
    type: file
    destination: TASK_DIR/package/reports/performance_report.md
    required: true
    validation:
    - contains_pipeline_timing
    - contains_model_efficiency
    - contains_latency
    - contains_board_memory
  - id: model_convert_requirements
    type: file
    destination: TASK_DIR/package/model_convert/requirements.txt
    required: true
    validation:
    - exists
    - non_empty
  - id: compile_script
    type: file
    destination: TASK_DIR/package/model_convert/compile_pulsar2.sh
    required: true
    validation:
    - exists
    - executable
  - id: python_sdk_readme
    type: file
    destination: TASK_DIR/package/python/README.md
    required: true
    validation:
    - exists
    - contains_env_install
    - contains_quick_run
    - contains_api
  - id: cpp_sdk_readme
    type: file
    destination: TASK_DIR/package/cpp/README.md
    required: true
    validation:
    - exists
    - contains_build_steps
    - contains_board_deploy
    - contains_api
  state_machine:
    initial: draft
    states:
    - draft
    - awaiting_user
    - ready
    - running
    - validating
    - retrying
    - rolling_back
    - degraded
    - blocked
    - failed
    - succeeded
    terminal:
    - blocked
    - failed
    - succeeded
    transitions:
    - from: draft
      to: awaiting_user
      when: required information or capability source is missing
    - from: draft
      to: ready
      when: requirements and required capabilities are sufficient
    - from: ready
      to: running
      when: execution starts
    - from: running
      to: validating
      when: all required execution steps finish
    - from: validating
      to: succeeded
      when: all acceptance checks pass
    - from: validating
      to: retrying
      when: a recoverable check fails and retry budget remains
    - from: retrying
      to: running
      when: repair step is scheduled
    - from: running
      to: rolling_back
      when: a failure requires rollback
    - from: rolling_back
      to: failed
      when: rollback completes and no retry path remains
    - from: running
      to: degraded
      when: optional capability fails and degraded output is acceptable
    - from: running
      to: blocked
      when: required external input, permission, or credential is unavailable
  steps:
  - id: requirements_gate
    kind: gate
    skill: ''
    description: Verify SOURCE, TARGET_HARDWARE, BOARD, and required capability sources before any execution
    depends_on: []
    parallel_group: null
    inputs:
    - SOURCE
    - TARGET_HARDWARE
    - BOARD
    - PULSAR2_IMAGE
    - PULSAR2_BIN
    outputs:
    - requirements_ready
    timeout_seconds: null
    retry:
      max_attempts: 0
      retry_on: []
      backoff: none
    on_failure:
      action: ask_user
      target_step: null
    visibility: user_visible
  - id: acquire
    kind: agent
    skill: .codex/skills/magnetar/hidden/acquire/SKILL.md
    description: Acquire SOURCE into TASK_DIR/origin and produce manifest
    depends_on:
    - requirements_gate
    parallel_group: null
    inputs:
    - SOURCE
    - HF_TOKEN
    - TASK_DIR
    - HF_ENDPOINT
    outputs:
    - origin_path
    - acquire_manifest
    timeout_seconds: 900
    retry:
      max_attempts: 2
      retry_on:
      - network_timeout
      - partial_download
      backoff: exponential
    on_failure:
      action: ask_user
      target_step: null
    visibility: user_visible
  - id: init
    kind: agent
    skill: .codex/skills/magnetar/hidden/init/SKILL.md
    description: Initialize TASK_DIR structure and audit logs
    depends_on:
    - acquire
    parallel_group: null
    inputs:
    - TASK_DIR
    - MODEL_NAME
    - TARGET_HARDWARE
    - acquire_manifest
    - uv
    outputs:
    - task_md
    - analysis_md
    timeout_seconds: 120
    retry:
      max_attempts: 1
      retry_on:
      - filesystem_transient
      backoff: fixed
    on_failure:
      action: fail
      target_step: null
    visibility: summarized
  - id: export
    kind: agent
    skill: .codex/skills/magnetar/hidden/export/SKILL.md
    description: Export static ONNX, validate against source model, generate metadata and calibration data
    depends_on:
    - init
    parallel_group: null
    inputs:
    - origin_path
    - acquire_manifest
    - TASK_DIR
    - HF_ENDPOINT
    - uv
    outputs:
    - onnx_path
    - model_meta_json
    - calibration_dir
    - export_report
    timeout_seconds: 3600
    retry:
      max_attempts: 2
      retry_on:
      - import_error
      - export_failed
      - validation_mismatch
      backoff: none
    on_failure:
      action: ask_user
      target_step: null
    visibility: user_visible
  - id: toolchain
    kind: agent
    skill: .codex/skills/magnetar/hidden/toolchain/SKILL.md
    description: Verify Pulsar2 and prepare optional C++ aarch64 toolchain
    depends_on:
    - export
    parallel_group: null
    inputs:
    - PULSAR2_IMAGE
    - PULSAR2_BIN
    - PULSAR2_HF_REPO
    - TASK_DIR
    - HF_ENDPOINT
    outputs:
    - pulsar2_command
    - cxx_toolchain_file
    timeout_seconds: 1200
    retry:
      max_attempts: 2
      retry_on:
      - download_failed
      - docker_pull_failed
      backoff: fixed
    on_failure:
      action: ask_user
      target_step: null
    visibility: user_visible
  - id: compile
    kind: agent
    skill: .codex/skills/magnetar/hidden/compile/SKILL.md
    description: Compile ONNX to AXMODEL using Pulsar2
    depends_on:
    - toolchain
    parallel_group: null
    inputs:
    - onnx_path
    - model_meta_json
    - calibration_dir
    - TARGET_HARDWARE
    - pulsar2_command
    outputs:
    - axmodel_path
    - compile_report
    timeout_seconds: 3600
    retry:
      max_attempts: 1
      retry_on:
      - pulsar2_transient
      backoff: none
    on_failure:
      action: ask_user
      target_step: export
    visibility: user_visible
  - id: simulate
    kind: agent
    skill: .codex/skills/magnetar/hidden/simulate/SKILL.md
    description: Compare ONNX and AXMODEL simulation outputs
    depends_on:
    - compile
    parallel_group: null
    inputs:
    - onnx_path
    - axmodel_path
    - model_meta_json
    - TASK_DIR
    outputs:
    - simulate_report
    - accuracy_metrics
    - simulation_latency_ms
    timeout_seconds: 1200
    retry:
      max_attempts: 1
      retry_on:
      - simulation_transient
      backoff: none
    on_failure:
      action: ask_user
      target_step: compile
    visibility: user_visible
  - id: accuracy_gate
    kind: gate
    skill: ''
    description: Decide whether simulation accuracy is acceptable
    depends_on:
    - simulate
    parallel_group: null
    inputs:
    - accuracy_metrics
    outputs:
    - accuracy_accepted
    timeout_seconds: null
    retry:
      max_attempts: 0
      retry_on: []
      backoff: none
    on_failure:
      action: ask_user
      target_step: compile
    visibility: user_visible
  - id: sdk_python
    kind: agent
    skill: .codex/skills/magnetar/hidden/sdk-gen/SKILL.md
    description: Generate Python SDK
    depends_on:
    - accuracy_gate
    parallel_group: sdk
    inputs:
    - axmodel_path
    - model_meta_json
    - MODEL_NAME
    outputs:
    - python_sdk_path
    timeout_seconds: 900
    retry:
      max_attempts: 1
      retry_on:
      - generation_error
      backoff: none
    on_failure:
      action: fail
      target_step: null
    visibility: summarized
  - id: sdk_cpp
    kind: agent
    skill: .codex/skills/magnetar/hidden/sdk-gen/SKILL.md
    description: Generate C++ SDK
    depends_on:
    - accuracy_gate
    parallel_group: sdk
    inputs:
    - axmodel_path
    - model_meta_json
    - MODEL_NAME
    - cxx_toolchain_file
    outputs:
    - cpp_sdk_path
    timeout_seconds: 900
    retry:
      max_attempts: 1
      retry_on:
      - generation_error
      backoff: none
    on_failure:
      action: fail
      target_step: null
    visibility: summarized
  - id: sdk_validation
    kind: synthesis
    skill: .codex/skills/magnetar/hidden/sdk-gen/SKILL.md
    description: Join Python and C++ SDK generation and validate both
    depends_on:
    - sdk_python
    - sdk_cpp
    parallel_group: null
    inputs:
    - python_sdk_path
    - cpp_sdk_path
    outputs:
    - sdk_report
    timeout_seconds: 600
    retry:
      max_attempts: 1
      retry_on:
      - validation_failed
      backoff: none
    on_failure:
      action: fail
      target_step: null
    visibility: user_visible
  - id: runonboard
    kind: agent
    skill: .codex/skills/magnetar/hidden/runonboard/SKILL.md
    description: Validate Python and C++ SDKs on the AX board. BOARD is already verified at requirements gate.
    depends_on:
    - sdk_validation
    parallel_group: null
    inputs:
    - BOARD
    - BOARD_PASSWORD
    - TARGET_HARDWARE
    - axmodel_path
    - model_meta_json
    - TASK_DIR
    outputs:
    - runonboard_report
    - python_latency_ms
    - cpp_latency_ms
    - system_memory_mb
    - cmm_memory_info
    timeout_seconds: 1800
    retry:
      max_attempts: 1
      retry_on:
      - ssh_transient
      backoff: fixed
    on_failure:
      action: ask_user
      target_step: null
    visibility: user_visible
  - id: package
    kind: agent
    skill: .codex/skills/magnetar/hidden/package/SKILL.md
    description: 'Assemble final customer package with complete reproducibility: requirements.txt, compile script, detailed
      READMEs for all subdirectories'
    depends_on:
    - runonboard
    parallel_group: null
    inputs:
    - axmodel_path
    - model_meta_json
    - python_sdk_path
    - cpp_sdk_path
    - export_report
    - compile_report
    - simulate_report
    - runonboard_report
    outputs:
    - package_dir
    - customer_readme
    - performance_report
    - model_convert_readme
    - python_sdk_readme
    - cpp_sdk_readme
    - model_convert_requirements
    - compile_script
    timeout_seconds: 300
    retry:
      max_attempts: 1
      retry_on:
      - filesystem_transient
      backoff: fixed
    on_failure:
      action: fail
      target_step: null
    visibility: user_visible
  - id: final_validation
    kind: gate
    skill: ''
    description: Validate package against acceptance checks
    depends_on:
    - package
    parallel_group: null
    inputs:
    - package_dir
    outputs:
    - acceptance_result
    timeout_seconds: 600
    retry:
      max_attempts: 0
      retry_on: []
      backoff: none
    on_failure:
      action: fail
      target_step: null
    visibility: user_visible
  gates:
  - id: required_inputs
    kind: requirement
    depends_on: []
    pass_when:
    - SOURCE is provided
    - TARGET_HARDWARE is provided
    - BOARD is provided (RUNONBOARD is mandatory)
    fail_when:
    - required input is missing
    - BOARD is not provided
    on_pass: proceed to acquire
    on_fail: ask user for missing input (including BOARD)
  - id: pulsar2_available
    kind: capability
    depends_on:
    - toolchain
    pass_when:
    - PULSAR2_BIN works or PULSAR2_IMAGE works or pulsar2 is on PATH or HuggingFace AXERA-TECH/Pulsar2 image is available
      through hf-mirror
    fail_when:
    - no local, user-provided, or HuggingFace Pulsar2 runtime is available through hf-mirror
    on_pass: proceed to compile
    on_fail: block and request Pulsar2 source
  - id: export_valid
    kind: validation
    depends_on:
    - export
    pass_when:
    - ONNX static shape validation passes
    - ONNXRuntime load passes
    - source-vs-ONNX comparison is acceptable
    fail_when:
    - model export or validation fails
    on_pass: proceed to toolchain
    on_fail: ask user or retry export strategy
  - id: accuracy_gate
    kind: validation
    depends_on:
    - simulate
    pass_when:
    - cosine >= 0.99 or task-specific metrics are accepted
    fail_when:
    - accuracy below threshold
    on_pass: proceed to SDK generation
    on_fail: STOP and ask whether to adjust compile/export settings
  - id: package_validation
    kind: validation
    depends_on:
    - package
    pass_when:
    - all required package artifacts exist
    - model_convert/requirements.txt is present and non-empty
    - model_convert/compile_pulsar2.sh is present and executable
    - model_convert/README.md contains complete pulsar2 build command with no placeholders
    - python/README.md covers env install, quick run, and API
    - cpp/README.md covers local build, cross-compile, board deploy, and API
    - package/README.md covers model overview, quick start (inference + reproduce), directory layout, performance, and limitations
    - RUNONBOARD passed with board validation report
    - performance_report.md exists with pipeline timing, model efficiency, latency, and board memory sections
    fail_when:
    - required artifact is missing
    - any README contains placeholder text ("...", "<path>", "<fill me>")
    - pulsar2 build command is incomplete or omitted
    - requirements.txt is missing
    - BOARD was not provided so RUNONBOARD could not execute
    on_pass: succeeded
    on_fail: failed
  failure_policy:
    default_action: fail
    max_total_attempts: 3
    rollback_required_for:
    - package directory rewrite after failed package validation
    ask_user_for:
    - missing SOURCE, TARGET_HARDWARE, or BOARD (checked at requirements gate)
    - private model credentials
    - ambiguous model file or export entry
    - unavailable Pulsar2
    - random-only calibration data
    - accuracy below threshold
    - board credentials
    degraded_output_allowed: true
    degraded_conditions:
    - C++ cross compiler unavailable but CMake configure succeeds
  observability:
    progress_updates: milestone
    audit_log:
      enabled: true
      include_hidden_steps: true
    artifacts:
      record_intermediate_outputs: true
      retention: workflow-local
    required_logs:
    - TASK_DIR/task.md
    - TASK_DIR/analysis.md
  completion:
    success_when:
    - package/models/model.axmodel exists
    - package/python exists and import check passed
    - package/python/README.md covers env install, quick run, and API
    - package/cpp exists and cmake configure passed
    - package/cpp/README.md covers local/cross build, board deploy, and API
    - package/model_convert/export_onnx.py exists
    - package/model_convert/pulsar2_config.json exists
    - package/model_convert/requirements.txt exists and is non-empty
    - package/model_convert/compile_pulsar2.sh exists and is executable
    - package/model_convert/README.md contains complete pulsar2 command without placeholders
    - package/reports/simulate_report.md exists
    - package/reports/performance_report.md exists with all required sections
    - package/README.md exists and covers model overview, quick start, directory layout, performance, and limitations
    - RUNONBOARD has been executed and report exists
    - no README contains placeholder text
    failure_when:
    - required Pulsar2 capability is unavailable
    - ONNX export cannot be validated
    - AXMODEL compile fails with no accepted repair path
    - SDK generation fails
    - acceptance checks fail after retry budget is exhausted
    - BOARD was not provided (checked at requirements gate, should never reach here)
    final_response:
      include_artifacts: true
